[build]
  command = "yarn build"
  publish = "dist"

# ビルド・Functions ランタイムを Node.js 22 に固定
[build.environment]
  NODE_VERSION = "22"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# 自己ホストフォントの長期キャッシュ（不変アセット）
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
